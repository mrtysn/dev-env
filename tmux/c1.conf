# =============================================================================
# C1 — Office Mac
# Prefix: Ctrl-a | Status: Blue | Indicator: [C1]
# =============================================================================

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
setw -g aggressive-resize on

# --- No bells ---
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation (Alt + arrow, no prefix) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Pane resize (prefix + Shift-arrow) ---
bind S-Left resize-pane -L 5
bind S-Right resize-pane -R 5
bind S-Up resize-pane -U 3
bind S-Down resize-pane -D 3

# --- Window navigation ---
bind -n S-Left previous-window
bind -n S-Right next-window

# --- New window in current path ---
bind c new-window -c "#{pane_current_path}"

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Session switcher ---
bind S choose-tree -s

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Status bar: Blue ---
set -g status-position bottom
set -g status-style "bg=colour24,fg=colour255"
set -g status-left-length 30
set -g status-right-length 40
set -g status-left "#[fg=colour255,bg=colour31,bold] [C1] #S #[fg=colour31,bg=colour24] "
set -g status-right "#[fg=colour255] %H:%M "
set -g status-justify left

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour24,bg=colour39]#[fg=colour255,bg=colour39,bold] #I:#W #[fg=colour39,bg=colour24]"

# Pane borders
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour39"

# Message style
set -g message-style "bg=colour39,fg=colour255,bold"
